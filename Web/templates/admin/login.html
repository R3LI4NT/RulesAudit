<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RulesAudit - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #e0ffe0;
            position: relative;
            overflow-x: hidden;
            transition: all 0.5s ease;
        }

        body.error-state {
            background: #1a0a0a;
        }

        body.error-state::before {
            background: linear-gradient(transparent 50%, rgba(255, 0, 0, 0.03) 50%);
        }

        body.error-state .matrix-bg {
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 0, 0, 0.02) 0px,
                rgba(255, 0, 0, 0) 2px,
                transparent 3px
            );
        }

        body.error-state .particle {
            background: #ff0000;
        }

        body.error-state .cursor-dot {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        body.error-state .cursor-outline {
            border: 2px solid rgba(255, 0, 0, 0.5);
        }

        body.error-state .cursor-line-x {
            background: linear-gradient(90deg, transparent, #ff0000, #ff0000, transparent);
            box-shadow: 0 0 15px #ff0000;
        }

        body.error-state .cursor-line-y {
            background: linear-gradient(180deg, transparent, #ff0000, #ff0000, transparent);
            box-shadow: 0 0 15px #ff0000;
        }

        body.error-state .login-box {
            background: linear-gradient(135deg, #2a0000 0%, #3a0000 100%);
            border: 2px solid #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5), inset 0 0 30px rgba(255, 0, 0, 0.1);
        }

        body.error-state .login-box::before {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        body.error-state .title {
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5),
                         0 0 20px rgba(255, 0, 0, 0.3),
                         0 0 30px rgba(255, 0, 0, 0.1);
        }

        body.error-state .subtitle {
            color: #ff6b6b;
        }

        body.error-state .terminal-cursor {
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        body.error-state .form-group label {
            color: #ff6b6b;
        }

        body.error-state .form-control {
            background: rgba(80, 0, 0, 0.6);
            border: 1px solid #ff3333;
            color: #ff6b6b;
        }

        body.error-state .form-control:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            background: rgba(120, 0, 0, 0.8);
        }

        body.error-state .form-control::placeholder {
            color: #ffa0a0;
        }

        body.error-state .btn-login {
            border: 2px solid #ff0000;
            color: #ff0000;
        }

        body.error-state .btn-login:hover {
            background: rgba(255, 0, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
        }

        body.error-state .btn-login::before {
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.4), transparent);
        }

        body.error-state .logo {
            background: linear-gradient(135deg, #640000, #8B0000, #8B2222);
            border: 2px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        body.error-state .badge {
            background: linear-gradient(135deg, #ff0000, #cc0000);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 255, 0, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            transition: all 0.5s ease;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s, box-shadow 0.5s ease;
            box-shadow: 0 0 20px #00ff00;
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0, 255, 0, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease, border-color 0.5s ease;
        }

        .cursor-dot.lupa {
            width: 20px !important;
            height: 20px !important;
            background: rgba(0, 255, 0, 0.9) !important;
            mix-blend-mode: screen;
            box-shadow: 0 0 30px #00ff00, 0 0 60px #00ff00 !important;
        }

        .cursor-line-x {
            position: fixed;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff00, #00ff00, transparent);
            pointer-events: none;
            z-index: 9997;
            transform: translateY(-50%);
            opacity: 0.3;
            box-shadow: 0 0 15px #00ff00;
            animation: pulseGlow 2s infinite;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .cursor-line-y {
            position: fixed;
            height: 100%;
            width: 1px;
            background: linear-gradient(180deg, transparent, #00ff00, #00ff00, transparent);
            pointer-events: none;
            z-index: 9997;
            transform: translateX(-50%);
            opacity: 0.3;
            box-shadow: 0 0 15px #00ff00;
            animation: pulseGlow 2s infinite;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #00ff00;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
            z-index: 0;
            animation: floatParticle 8s infinite linear;
            transition: background 0.5s ease;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.02) 0px,
                rgba(0, 255, 0, 0) 2px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 0;
            transition: background 0.5s ease;
        }

        .notification-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .notification {
            min-width: 300px;
            max-width: 400px;
            padding: 16px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(-120%);
            animation: slideInNotification 0.3s ease forwards;
            border-left: 4px solid;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .notification.success {
            background: rgba(0, 0, 0, 0.9);
            border-left-color: #00ff00;
            color: #00ff00;
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .notification.error {
            background: rgba(0, 0, 0, 0.9);
            border-left-color: #ff3333;
            color: #ff6b6b;
            border: 1px solid #ff3333;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
        }

        .notification i {
            font-size: 20px;
        }

        .notification.success i {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .notification.error i {
            color: #ff3333;
            text-shadow: 0 0 10px #ff3333;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 700;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .notification-message {
            font-size: 13px;
            opacity: 0.9;
        }

        .notification-close {
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s ease;
            pointer-events: auto;
        }

        .notification-close:hover {
            opacity: 1;
        }

        @keyframes slideInNotification {
            to {
                transform: translateX(0);
            }
        }

        @keyframes slideOutNotification {
            to {
                transform: translateX(-120%);
                opacity: 0;
            }
        }

        .notification.closing {
            animation: slideOutNotification 0.3s ease forwards;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }

        .login-box {
            background: linear-gradient(135deg, #001a00 0%, #003300 100%);
            border: 2px solid #00ff00;
            padding: 50px;
            width: 100%;
            max-width: 500px;
            box-shadow: 
                0 0 50px rgba(0, 255, 0, 0.5),
                inset 0 0 30px rgba(0, 255, 0, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .login-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            animation: scanline 3s linear infinite;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #006400, #228B22, #32CD32);
            border: 2px solid #00ff00;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            transition: all 0.5s ease;
        }

        .title.orbitron {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .title.audiowide {
            font-family: 'Audiowide', cursive;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .title.chakra {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            letter-spacing: 3px;
        }

        .title.rajdhani {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 3px;
        }

        .title.quantico {
            font-family: 'Quantico', sans-serif;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5),
                         0 0 20px rgba(0, 255, 0, 0.3),
                         0 0 30px rgba(0, 255, 0, 0.1);
            transition: all 0.5s ease;
        }

        .subtitle {
            color: #44ff44;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.5s ease;
        }

        #typed-text {
            display: inline-block;
        }

        .terminal-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #0f0;
            margin-left: 5px;
            animation: blink 1s infinite;
            box-shadow: 0 0 10px #0f0;
            vertical-align: middle;
            transition: background-color 0.5s ease, box-shadow 0.5s ease;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #44ff44;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.5s ease;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 80, 0, 0.6);
            border: 1px solid #33ff33;
            border-radius: 0;
            color: #00ff00;
            font-size: 16px;
            transition: all 0.5s ease;
            font-family: 'Inter', monospace;
        }

        .form-control:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            background: rgba(0, 120, 0, 0.8);
        }

        .form-control::placeholder {
            color: #88ff88;
            opacity: 0.7;
            transition: color 0.5s ease;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            margin-top: 20px;
        }

        .btn-login::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.4), transparent);
            transition: left 0.5s ease, background 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.7);
            transform: translateY(-2px);
        }

        .badge {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            transition: background 0.5s ease;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            min-height: 18px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.show {
            opacity: 1;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(circle at center, #0a1f0a 0%, #050a05 100%);
        }

        @media (max-width: 600px) {
            .login-box {
                margin: 20px;
                padding: 30px;
            }
            
            .title {
                font-size: 24px;
            }

            .notification {
                min-width: 250px;
                max-width: 300px;
            }

            * {
                cursor: auto;
            }
            
            .cursor-dot,
            .cursor-outline,
            .cursor-line-x,
            .cursor-line-y {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="notification-container" id="notificationContainer"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="cursor-line-x"></div>
    <div class="cursor-line-y"></div>

    <div class="particles" id="particles"></div>
    <script>
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = 5 + Math.random() * 5 + 's';
            document.body.appendChild(particle);
        }
    </script>
    
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <div class="logo">
                    <img src="{{ url_for('static', filename='img/icon-3.png') }}" alt="RulesAudit Logo" width="110" height="120" style="object-fit: contain;">
                </div>
                <h1 class="title orbitron">Rules Audit</h1>
                <div class="subtitle">
                    <span id="typed-text"></span>
                    <span class="terminal-cursor"></span>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <script>
                            (function() {
                                const category = "{{ category }}";
                                const message = "{{ message }}";
                                setTimeout(() => {
                                    showNotification(category === 'success' ? 'success' : 'error', message);
                                    
                                    if (category !== 'success') {
                                        document.body.classList.add('error-state');
                                        
                                        setTimeout(() => {
                                            document.body.classList.remove('error-state');
                                        }, 5000);
                                    }
                                }, 500);
                            })();
                        </script>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form id="loginForm" method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">USUARIO</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="admin" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="password">CONTRASEÑA</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" autocomplete="off" required>
                </div>

                <button type="submit" class="btn-login" id="loginButton">
                    <i class="fas fa-sign-in-alt"></i> ACCESO AL SISTEMA
                </button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/particulas.js') }}"></script>
    
    <script>
        let isSubmitting = false;

        function removeErrorState() {
            document.body.classList.remove('error-state');
        }

        function showNotification(type, message) {
            const container = document.getElementById('notificationContainer');
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            const title = type === 'success' ? 'ACCESO CONCEDIDO' : 'ACCESO DENEGADO';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close" onclick="this.parentElement.classList.add('closing'); setTimeout(() => this.parentElement.remove(), 300)">
                    <i class="fas fa-times"></i>
                </div>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.classList.add('closing');
                    setTimeout(() => notification.remove(), 300);
                }
            }, 5000);

            return notification;
        }

        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        const cursorLineX = document.querySelector('.cursor-line-x');
        const cursorLineY = document.querySelector('.cursor-line-y');

        document.addEventListener('mousemove', function(e) {
            const posX = e.clientX;
            const posY = e.clientY;

            cursorDot.style.left = posX + 'px';
            cursorDot.style.top = posY + 'px';
            cursorOutline.style.left = posX + 'px';
            cursorOutline.style.top = posY + 'px';
            cursorLineX.style.top = posY + 'px';
            cursorLineY.style.left = posX + 'px';

            const target = e.target;
            
            const isText = target.matches('h1, h2, h3, h4, h5, h6, p, span, a, label, .title, .subtitle, #typed-text');
            const isInteractive = target.matches('button, a, input, .btn-login, .form-control, .notification-close');
            
            if (isText) {
                cursorDot.classList.add('lupa');
                cursorOutline.style.width = '50px';
                cursorOutline.style.height = '50px';
                cursorOutline.style.borderColor = document.body.classList.contains('error-state') ? '#ff8080' : '#80ff80';
                cursorLineX.style.opacity = '0.6';
                cursorLineY.style.opacity = '0.6';
            } else if (isInteractive) {
                cursorDot.classList.remove('lupa');
                cursorDot.style.width = '12px';
                cursorDot.style.height = '12px';
                cursorDot.style.background = document.body.classList.contains('error-state') ? '#ff8080' : '#80ff80';
                cursorOutline.style.width = '50px';
                cursorOutline.style.height = '50px';
                cursorOutline.style.borderColor = document.body.classList.contains('error-state') ? '#ff8080' : '#80ff80';
                cursorLineX.style.opacity = '0.6';
                cursorLineY.style.opacity = '0.6';
            } else {
                cursorDot.classList.remove('lupa');
                cursorDot.style.width = '8px';
                cursorDot.style.height = '8px';
                cursorOutline.style.width = '40px';
                cursorOutline.style.height = '40px';
                cursorLineX.style.opacity = '0.3';
                cursorLineY.style.opacity = '0.3';
            }
        });

        document.addEventListener('mouseleave', function() {
            cursorDot.style.opacity = '0';
            cursorOutline.style.opacity = '0';
            cursorLineX.style.opacity = '0';
            cursorLineY.style.opacity = '0';
        });

        document.addEventListener('mouseenter', function() {
            cursorDot.style.opacity = '1';
            cursorOutline.style.opacity = '1';
            cursorLineX.style.opacity = '0.3';
            cursorLineY.style.opacity = '0.3';
        });

        function typeWriter() {
            const text = "Auditoría de Reglas de Firewall";
            const typedTextElement = document.getElementById('typed-text');
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    typedTextElement.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                }
            }
            
            setTimeout(type, 500);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');
            
            if (isSubmitting) {
                e.preventDefault();
                return;
            }
            
            if (!username || !password) {
                e.preventDefault();
                showNotification('error', 'Usuario y contraseña son requeridos');
                
                document.body.classList.add('error-state');
                
                setTimeout(() => {
                    document.body.classList.remove('error-state');
                }, 5000);
                
                return;
            }

        });

        window.onload = function() {
            typeWriter();
        };
    </script>
</body>
</html>
